<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHICKODE - 학습지표 강화 대시보드</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body, html {
        overflow: auto !important; /* style.css의 hidden 속성 덮어쓰기 (대시보드는 길어서 스크롤 필요) */
      }

      .simple-page {
        width: 100vw;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        background: #f0f0f0;
      }
      .simple-card {
        background: rgba(253, 246, 227, 0.98);
        border: 4px solid #5d4037;
        border-radius: 18px;
        box-shadow: 10px 10px 0px #5d4037;
        max-width: 1100px;
        width: 100%;
        padding: 30px;
      }
      .simple-card h2 {
        color: #3e2723;
        font-size: 2rem;
        margin-bottom: 20px;
        border-bottom: 3px dashed #a38b75;
        padding-bottom: 10px;
      }

      /* AI 인사이트 (말풍선) 영역 */
      .ai-insight {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
        gap: 15px;
        background: #fff;
        padding: 15px 20px;
        border-radius: 15px;
        border: 2px solid #5d4037;
        box-shadow: 4px 4px 0px rgba(93, 64, 55, 0.2);
      }
      .ai-avatar {
        font-size: 3rem;
      }
      .ai-bubble {
        flex: 1;
        font-size: 1.15rem;
        font-weight: bold;
        color: #d32f2f; /* 강조를 위한 붉은 폰트 */
        line-height: 1.5;
      }

      /* 최상단 요약 스탯 */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 15px;
        margin-bottom: 25px;
      }
      .stat {
        background: #fff;
        border: 3px solid #8d6e63;
        border-radius: 14px;
        padding: 15px;
        box-shadow: 4px 4px 0px #8d6e63;
        text-align: center;
      }
      .stat .label { color: #5d4037; font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
      .stat .value { font-size: 2rem; font-weight: 900; color: #3e2723; }

      /* 차트 그리드 레이아웃 */
      .chart-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }
      .chart-box {
        background: #fff;
        border: 2px solid #a38b75;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .chart-box.full-width {
        grid-column: span 2;
      }
      .chart-title {
        font-weight: bold;
        color: #5d4037;
        margin-bottom: 10px;
        width: 100%;
        text-align: center;
      }
      /* 캔버스 래퍼로 크기 제어 */
      .canvas-wrapper {
        position: relative;
        width: 100%;
        height: 250px;
        display: flex;
        justify-content: center;
      }

      /* 하단 상세 데이터 테이블 */
      .datatable-section {
        margin-bottom: 30px;
      }
      .section-title {
        color: #3e2723;
        margin-bottom: 15px;
        font-size: 1.3rem;
      }
      .data-grid-header {
        display: grid;
        grid-template-columns: 2fr 1fr 1.5fr 1fr;
        background: #8d6e63;
        color: white;
        padding: 12px;
        border-radius: 8px 8px 0 0;
        font-weight: bold;
        text-align: center;
      }
      .data-grid-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1.5fr 1fr;
        background: #fff;
        padding: 12px;
        border-bottom: 1px solid #ddd;
        align-items: center;
        text-align: center;
        transition: 0.2s;
      }
      .data-grid-row:last-child {
        border-radius: 0 0 8px 8px;
        border-bottom: 2px solid #8d6e63;
      }
      .data-grid-row:hover { background: #fdf6e3; }
      
      /* 취약 항목 하이라이트 */
      .weak-point {
        color: #d32f2f;
        font-weight: bold;
        background: #ffebee;
      }
      .data-grid-row.weak-row {
        background: #fff5f5;
        border-left: 5px solid #d32f2f;
      }

      /* Call to Action 복습 버튼 */
      .cta-btn {
        background: #ffcc80;
        color: #e65100;
        border: 2px solid #ef6c00;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        font-size: 0.85rem;
      }
      .cta-btn:hover {
        transform: scale(1.05);
        background: #ef6c00;
        color: white;
      }

      .simple-actions {
        display: flex;
        gap: 15px;
        justify-content: center;
      }
      .simple-actions a {
        display: inline-block;
        text-decoration: none;
        background: #5d4037;
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
        font-size: 1.1rem;
        transition: 0.2s;
      }
      .simple-actions a:hover {
        background: #3e2723;
        transform: translateY(-2px);
      }

      @media (max-width: 900px) {
        .chart-grid { grid-template-columns: 1fr; }
        .chart-box.full-width { grid-column: span 1; }
        .data-grid-header, .data-grid-row {
          font-size: 0.85rem;
          grid-template-columns: 2fr 1fr 1.5fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <button id="globalMenuBtn" class="global-menu-btn" title="Menu">☰</button>
    <nav class="main-nav" id="globalNav">
        <div class="nav-logo"><a href="index.html" style="color:inherit; text-decoration:none;">CHICKODE</a></div>
        <ul class="nav-links">
            <li><a href="index.html">홈</a></li>
            <li><a href="index.html">문제풀기</a></li>
            <li><a href="note.html">오답노트</a></li>
            <li><a href="pattern.html" style="background:rgba(255,255,255,0.3);">패턴분석</a></li>
            <li><a href="customize.html">커스터마이징</a></li>
        </ul>
    </nav>

    <div class="simple-page">
      <div class="simple-card">
        <h2>📊 나의 학습 지표 패널</h2>
        
        <div class="ai-insight">
            <div class="ai-avatar">🐥</div>
            <div class="ai-bubble" id="aiMessage">열심히 데이터를 수집 중이야 삐약!</div>
        </div>

        <div class="grid">
          <div class="stat"><div class="label">총 제출</div><div class="value" id="statTotal">0</div></div>
          <div class="stat"><div class="label">정답</div><div class="value" id="statCorrect" style="color: #2e7d32;">0</div></div>
          <div class="stat"><div class="label">오답</div><div class="value" id="statWrong" style="color: #c62828;">0</div></div>
        </div>

        <div class="chart-grid">
            <div class="chart-box">
                <div class="chart-title">종합 정답률</div>
                <div class="canvas-wrapper"><canvas id="doughnutChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">최근 5회차 오답/정답 횟수 추이</div>
                <div class="canvas-wrapper"><canvas id="lineChart"></canvas></div>
            </div>

        </div>

        <div class="datatable-section">
            <h3 class="section-title">🔍 상세 분석 (취약점 리스트)</h3>
            <div class="data-grid-header">
                <div>분류(유형)</div>
                <div>정답률</div>
                <div>정답/오답 갯수</div>
                <div>액션</div>
            </div>
            <div id="dataTableBody" class="data-grid-body">
                <div style="padding: 20px; text-align:center; background:#fff;">아직 기록이 부족합니다!</div>
            </div>
        </div>

        
      </div>
    </div>

    <script>
        const globalMenuBtn = document.getElementById('globalMenuBtn');
        const globalNav = document.getElementById('globalNav');
        globalMenuBtn.onclick = (e) => { 
            e.stopPropagation(); 
            globalNav.classList.toggle('show'); 
        };
        document.addEventListener('click', (e) => {
            if (globalNav.classList.contains('show') && !globalNav.contains(e.target) && e.target !== globalMenuBtn)
                globalNav.classList.remove('show');
        });
    </script>
    <script type="module" src="pattern.js"></script>
  </body>
</html>
