<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHICKODE - 오답노트</title>
    <link rel="stylesheet" href="note-style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- index.html과 동일한 네비게이션바 -->
    <button id="globalMenuBtn" class="global-menu-btn" title="Menu">☰</button>
    <nav class="main-nav" id="globalNav">
        <div class="nav-logo"><a href="index.html" style="color:inherit; text-decoration:none;">CHICKODE</a></div>
        <ul class="nav-links">
            <li><a href="index.html">홈</a></li>
            <li><a href="index.html">문제풀기</a></li>
            <li><a href="note.html" style="background:rgba(255,255,255,0.3);">오답노트</a></li>
            <li><a href="pattern.html">패턴분석</a></li>
            <li><a href="customize.html">커스터마이징</a></li>
        </ul>
    </nav>

    <div class="note-container" style="padding-top: 20px;">
        <main class="note-book">
            <div class="book-title-tag">CHICKODE: 오답노트</div>

            <div class="book-content">
                <aside class="chapter-sidebar">
                    <div class="sidebar-section-title">정렬</div>
                    <div class="sort-btn-group" id="sortBtnGroup">
                        <button class="sort-btn active" data-sort="newest">최신순</button>
                        <button class="sort-btn" data-sort="oldest">오래된 순</button>
                        <button class="sort-btn" data-sort="mostWrong">많이 틀린 순</button>
                    </div>
                    <div class="sidebar-divider"></div>
                    <div class="sidebar-section-title">챕터</div>
                    <div id="chapterSidebar"></div>
                </aside>

                <section class="wrong-answer-area">
                    <h3 class="area-title">오답 모음</h3>
                    <div id="noteEmpty" class="tip-box" style="display:none;">
                        아직 오답이 없어! 메인에서 문제를 풀고 틀리면 여기에 자동으로 저장돼.
                    </div>
                    <div id="wrongList" class="wrong-item-container"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const globalMenuBtn = document.getElementById('globalMenuBtn');
        const globalNav = document.getElementById('globalNav');
        globalMenuBtn.onclick = (e) => { e.stopPropagation(); globalNav.classList.toggle('show'); };
        document.addEventListener('click', (e) => {
            if (globalNav.classList.contains('show') && !globalNav.contains(e.target) && e.target !== globalMenuBtn)
                globalNav.classList.remove('show');
        });
    </script>
    <script type="module" src="note.js"></script>
</body>
</html>
