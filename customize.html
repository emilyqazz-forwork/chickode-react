<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHICKODE - 커스터마이징</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .simple-page {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .simple-card {
        background: rgba(253, 246, 227, 0.95);
        border: 4px solid #5d4037;
        border-radius: 18px;
        box-shadow: 10px 10px 0px #5d4037;
        max-width: 720px;
        width: 100%;
        padding: 28px;
      }
      .simple-card h2 {
        margin-bottom: 10px;
        color: #3e2723;
      }
      .simple-card p {
        color: #5d4037;
        line-height: 1.6;
      }
      .simple-actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .simple-actions a {
        display: inline-block;
        text-decoration: none;
        background: #5d4037;
        color: white;
        padding: 10px 14px;
        border-radius: 12px;
        border: 2px solid #3e2723;
      }

      .field {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        color: #3e2723;
        font-weight: 800;
      }
      .field input {
        padding: 12px 12px;
        border-radius: 12px;
        border: 3px solid #5d4037;
        outline: none;
        font-size: 1rem;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .btn {
        appearance: none;
        border: 2px solid #3e2723;
        background: #5d4037;
        color: white;
        border-radius: 12px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 800;
      }
      .btn.secondary {
        background: white;
        color: #3e2723;
      }
      .hint {
        margin-top: 10px;
        color: #5d4037;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="simple-page">
      <div class="simple-card">
        <h2>커스터마이징</h2>
        <p>여기서 내 이름(프로필)을 바꾸고, 학습 기록을 초기화할 수 있어.</p>

        <div class="field">
          <label for="nameInput">이름</label>
          <input id="nameInput" type="text" maxlength="12" placeholder="예: 상우" />
        </div>

        <div class="btn-row">
          <button class="btn" id="saveBtn" type="button">저장</button>
          <button class="btn secondary" id="resetBtn" type="button">학습기록 초기화</button>
        </div>

        <div class="hint">
          - “학습기록”은 오답노트/패턴분석에 쓰이는 제출 기록이야.<br />
          - AI 채팅은 `GOOGLE_API_KEY`를 설정하면 켤 수 있어.
        </div>
        <div class="simple-actions">
          <a href="index.html">메인으로</a>
          <a href="note.html">오답노트로</a>
          <a href="pattern.html">패턴분석</a>
        </div>
      </div>
    </div>
    <script type="module" src="customize.js"></script>
  </body>
</html>
